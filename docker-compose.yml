services:
  # ── Endee Vector Database (from Mindventor/endee fork) ───────────────
  endee:
    image: endeeio/endee-server:latest
    container_name: endee-server
    ports:
      - "8080:8080"
    environment:
      NDD_NUM_THREADS: 0
      NDD_AUTH_TOKEN: "${ENDEE_API_TOKEN:-}"
    volumes:
      - endee_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: endee-backend
    ports:
      - "8000:8000"
    environment:
      - ENDEE_BASE_URL=http://endee:8080/api/v1
      - ENDEE_API_TOKEN=${ENDEE_API_TOKEN:-}
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
    depends_on:
      endee:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - model_cache:/root/.cache

  # ── Frontend (React + Nginx) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: endee-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  endee_data:
  model_cache:
